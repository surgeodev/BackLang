<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BackLang Documentation</title>
  <link rel="icon" href="https://raw.githubusercontent.com/surgeodev/BackLang/main/vscode-extension/media/icon.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.min.css">
  <style>
    :root { --docsifytabs-border-color: #30363d; --sidebar-width: 22rem; }
    .sidebar { background: #161b22; border-right: 1px solid #30363d; }
    .sidebar-nav { padding: 12px; }
    .sidebar ul li a { color: #c9d1d9; font-size: 14px; }
    .sidebar ul li a:hover { color: #58a6ff; }
    .sidebar ul li.active > a { color: #58a6ff; border-right: 2px solid #58a6ff; }
    .markdown-section { max-width: 900px; }
    .markdown-section h1 { color: #f0f6fc; border-bottom: 1px solid #30363d; padding-bottom: 8px; }
    .markdown-section h2 { color: #f0f6fc; border-bottom: 1px solid #30363d; padding-bottom: 6px; margin-top: 32px; }
    .markdown-section h3 { color: #f0f6fc; margin-top: 24px; }
    .markdown-section code { background: #1c2128; color: #ffa657; padding: 2px 6px; border-radius: 4px; }
    .markdown-section pre { background: #1c2128; border: 1px solid #30363d; border-radius: 6px; }
    .markdown-section pre code { background: none; }
    .markdown-section table { border-collapse: collapse; }
    .markdown-section th, .markdown-section td { border: 1px solid #30363d; padding: 8px 12px; }
    .markdown-section th { background: #1c2128; color: #8b949e; }
    .markdown-section blockquote { border-left: 4px solid #58a6ff; background: #1c2128; padding: 12px 16px; }
    .app-nav { display: none; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script>
    window.$docsify = {
      name: 'BackLang',
      repo: 'https://github.com/surgeodev/BackLang',
      loadSidebar: true,
      subMaxLevel: 2,
      search: 'auto',
      themeColor: '#58a6ff',
      coverpage: false,
      auto2top: true,
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
</body>
</html>
